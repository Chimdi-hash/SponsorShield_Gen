# =============================================================================
# pytest.ini — SponsorShield test runner configuration
#
# Consumed by pytest when invoked from the project root.
# =============================================================================

[pytest]
# Default command-line options applied to every pytest run.
# -v  = verbose output (show each test name)
# -s  = don't capture stdout (helpful to see print() inside tests)
addopts = -v -s

# Discover tests only in these paths (keeps pytest fast on a lightweight machine)
testpaths =
    tests/direct
    tests/integration

# Show slowest 5 tests after each run
# (requires pytest-durations or similar plugin; safe to ignore if not installed)
# --durations=5

# Logging
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s  %(levelname)-8s  %(name)s — %(message)s
log_date_format = %H:%M:%S
